<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Chefs - Colaboradores</title>
    <link rel="stylesheet" href="css/colaboradores.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body onload="carregarColaboradoresPagina()">
    <header class="topo">
        <a href="#" onclick="history.back()" class="btn-voltar-topo">← Voltar</a>
        <img src="img/logo.png" alt="Logo Cloud Chefs" class="logo-topo">
        <h1>Colaboradores</h1>
    </header>

    <div class="container">
        
        <!-- SEÇÃO DE CADASTRO ATUALIZADA -->
        <div class="secao-cadastro">
            <h2>Cadastrar Novo Colaborador</h2>
            
            <div class="input-group">
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" class="input-text" placeholder="Ex: Mateus Vargas">
            </div>

            <!-- NOVO CAMPO: LOGIN -->
            <div class="input-group">
                <label for="login">Login (Usuário):</label>
                <input type="text" id="login" class="input-text" placeholder="Ex: mateus.vargas">
            </div>

            <div class="input-group">
                <label for="senha">Senha:</label>
                <div class="input-wrapper">
                    <input type="password" id="senha" class="input-text" placeholder="Mínimo 4 caracteres">
                    <button class="toggle-senha" onclick="toggleSenhaInput()">
                        <i id="eye-icon-cadastro" class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            
            <button class="btn-cadastrar" onclick="cadastrarColaborador()">CADASTRAR</button>
        </div>

        <!-- TABELA ATUALIZADA PARA O PADRÃO AWS -->
        <div class="secao-permissoes">
            <h2>Gestão de Usuários</h2>
            <table class="tabela-colaboradores">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Login</th> <!-- Mudou de Senha para Login -->
                        <th>Permissão</th>
                        <th>Ações</th> <!-- Mudou de Acessos para Ações -->
                    </tr>
                </thead>
                <tbody id="tabela-body">
                    <!-- Gerado dinamicamente pelo JS -->
                </tbody>
            </table>
        </div>
        
        <a href="monitoramento.html" class="btn-voltar-inferior">VOLTAR</a>
        
    </div>

    <div id="global-message-container"></div>
    <script src="js/auth.js"></script> 
    <script src="js/colaboradores.js?v=1.2"></script>
</body>
</html>
