<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Chefs - Gestão de Colaboradores</title>
    <link rel="stylesheet" href="css/colaboradores.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="topo">
        <a href="monitoramento.html" class="btn-voltar-topo">← Voltar</a>
        <h1>Gestão de Colaboradores</h1>
    </header>

    <div class="container">
        <div class="secao-cadastro">
            <h2>Cadastrar Novo Colaborador</h2>
            <div class="input-group">
                <label>Nome Completo:</label>
                <input type="text" id="nome" class="input-text" placeholder="Ex: Mateus Vargas">
            </div>
            <div class="input-group">
                <label>Login (Usuário):</label>
                <input type="text" id="login" class="input-text" placeholder="Ex: mateus">
            </div>
            <div class="input-group">
                <label>Senha:</label>
                <input type="password" id="senha" class="input-text">
            </div>
            <button class="btn-cadastrar" onclick="cadastrarColaborador()">CADASTRAR NO BANCO</button>
        </div>

        <div class="secao-lista">
            <h2>Usuários Cadastrados</h2>
            <table class="tabela-colaboradores">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Login</th>
                        <th>Permissão</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-body">
                    </tbody>
            </table>
        </div>
        <a href="monitoramento.html" class="btn-voltar-inferior">VOLTAR</a>
    </div>

    <script src="js/auth.js"></script> 
    <script src="js/colaboradores.js?v=1.5"></script>
</body>
</html>
